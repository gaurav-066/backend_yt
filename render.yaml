services:
  - type: web
    name: backend-yt-docker
    runtime: docker
    envVars:
      - key: API_URL
        value: https://backend-yt-docker.onrender.com
      - key: API_NAME
        value: vybzz-backend
      - key: IS_CUSTOM_CONFIG
        value: "true"
      # These flags trick YouTube
      - key: FETCH_IPV6
        value: "false"
      - key: YT_PLAYBACK
        value: "true"
